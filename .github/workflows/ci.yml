name: dialer-ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  dialer-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Clean potentially invalid GitHub auth headers
        run: |
          git config --global --unset-all http.https://github.com/.extraheader || true
          git config --global --unset-all http.extraheader || true

      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
